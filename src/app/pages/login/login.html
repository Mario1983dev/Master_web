<div class="login-page">
  <div class="login-card" role="dialog" aria-label="Inicio de sesión">

    <div class="brand">
      <!-- Ajusta el nombre si tu logo tiene otro archivo -->
     <img class="brand-logo" src="assets/logo-solusoft.jpg" alt="SoluSoft" />
      <div class="brand-text">
        <h1>Master ERP</h1>
        <p>Acceso administrativo</p>
      </div>
    </div>

    <form #f="ngForm" (ngSubmit)="onSubmit()" novalidate>

      <!-- ERROR BONITO -->
      <div class="alert error" *ngIf="errorMsg">
        <div class="alert-title">No se pudo iniciar sesión</div>
        <div class="alert-msg">{{ errorMsg }}</div>
      </div>

      <!-- EMAIL -->
      <div class="field">
        <label for="email">Correo</label>
        <div class="input">
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="username"
            placeholder="master@solusoft.cl"
            [(ngModel)]="email"
            required
            email
            [class.invalid]="f.submitted && !email"
          />
        </div>
        <div class="hint error" *ngIf="f.submitted && !email">
          Ingresa tu correo.
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input with-action">
          <input
            id="password"
            name="password"
            [type]="showPass ? 'text' : 'password'"
            autocomplete="current-password"
            placeholder="••••••••"
            [(ngModel)]="password"
            required
            [class.invalid]="f.submitted && !password"
          />

          <button
            type="button"
            class="icon-btn"
            (click)="showPass = !showPass"
            [attr.aria-label]="showPass ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <span *ngIf="!showPass">👁</span>
            <span *ngIf="showPass">🙈</span>
          </button>
        </div>

        <div class="hint error" *ngIf="f.submitted && !password">
          Ingresa tu contraseña.
        </div>
      </div>

      <!-- SUBMIT -->
      <button
        class="btn primary"
        type="submit"
        [disabled]="loading || f.invalid"
      >
        <span class="spinner" *ngIf="loading" aria-hidden="true"></span>
        <span>{{ loading ? 'Ingresando...' : 'Ingresar' }}</span>
      </button>

      <div class="foot">
        <span>© SoluSoft SPA</span>
      </div>
    </form>
  </div>
</div>
