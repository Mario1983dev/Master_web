<form (ngSubmit)="onSubmit()">
  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email"
    name="email"
    required
  />

  <input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password"
    name="password"
    required
  />

  <button type="submit">Ingresar</button>
</form>
