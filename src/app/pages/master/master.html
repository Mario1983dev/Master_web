
<div class="master-page">

  <header class="topbar">
    <div class="brand">
      <div class="brand-text">
        <div class="app-name">Master ERP</div>
        <div class="app-sub">Panel de administración</div>
      </div>
    </div>

    <div class="actions">
      <button class="logout-btn" (click)="logout()">Salir</button>
    </div>
  </header>

  <main class="content">

    <section class="hero">
      <h1>Master Panel</h1>
      <p>Gestiona oficinas y la configuración base del sistema.</p>
    </section>

    <section class="grid">
      <a class="card" [routerLink]="['/master/offices']">
        <div class="card-title">Oficinas</div>
        <div class="card-desc">
          Crear, editar y administrar oficinas.
        </div>
        <div class="card-cta">Ir a Oficinas →</div>
      </a>
    </section>

  </main>

  <footer class="footer">
    <span>© {{ year }} SoluSoft SPA</span>
  </footer>

</div>
