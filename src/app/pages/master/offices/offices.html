<div class="page">
  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="title">Oficinas</h1>
      <p class="subtitle">Administración de oficinas (Master)</p>
    </div>

    <button class="btn-primary" type="button">
      + Nueva oficina
    </button>
  </div>

  <!-- Estados -->
  <div *ngIf="loading" class="state">
    Cargando oficinas...
  </div>

  <div *ngIf="!loading && (errorMsg.length > 0)" class="state error">
    {{ errorMsg }}
  </div>

  <!-- Contenido -->
  <ng-container *ngIf="!loading && (errorMsg.length === 0)">
    <div *ngIf="offices.length === 0" class="state empty">
      No hay oficinas registradas.
    </div>

    <div *ngIf="offices.length > 0" class="table-wrap">
      <table class="table">
        <thead>
          <tr>
            <th>ID</th>
            <th>RUT</th>
            <th>Nombre</th>
            <th>Razón social</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th class="right">Estado</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let o of offices">
            <td class="muted">{{ o.id }}</td>
            <td>{{ o.rut }}</td>
            <td class="strong">{{ o.name }}</td>
            <td class="muted">{{ o.legal_name }}</td>
            <td>{{ o.email }}</td>
            <td>{{ o.phone }}</td>
            <td class="right">
              <span class="badge" [class.on]="o.status == 1" [class.off]="o.status != 1">
                {{ o.status == 1 ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </ng-container>
</div>
